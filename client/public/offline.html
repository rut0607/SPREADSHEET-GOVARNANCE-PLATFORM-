<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover" />
  <title>Offline — Alambre Cables</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1B2B5E;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 360px;
    }
    .badge {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #FF6B35 0%, #E91E8C 50%, #7B2FBE 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.8);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">AC</div>
    <h1>You are currently offline</h1>
    <p>Your work will be saved when connection is restored.</p>
  </div>
</body>
</html>
